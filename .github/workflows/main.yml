name: APK
on: [push]
  jobs:
  build:
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v3
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Build APK
      run: |
        pip install flet-cli
        flet build apk
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: MonApplicationTrading
        path: build/apk/*.apk
