name: Fabriquer mon APK Flet
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Installer Flet et creer l'APK
        run: |
          pip install flet-cli
          flet build apk
      - name: Telecharger mon APK termine
        uses: actions/upload-artifact@v3
        with:
          name: MonApplicationTrading
          path: build/apk/*.apk
